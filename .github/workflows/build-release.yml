name: Build Release

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - "v*"
      - "*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate signing secrets for tags
        if: startsWith(github.ref, 'refs/tags/')
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "Missing one or more required signing secrets: ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD"
            exit 1
          fi

      - name: Prepare signing keystore for tags
        if: startsWith(github.ref, 'refs/tags/')
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/release.keystore"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          echo "ORBIT_SIGNING_STORE_FILE=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "ORBIT_SIGNING_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ORBIT_SIGNING_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "ORBIT_SIGNING_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Build release APK
        env:
          ORBIT_SIGNING_STORE_FILE: ${{ env.ORBIT_SIGNING_STORE_FILE }}
          ORBIT_SIGNING_STORE_PASSWORD: ${{ env.ORBIT_SIGNING_STORE_PASSWORD }}
          ORBIT_SIGNING_KEY_ALIAS: ${{ env.ORBIT_SIGNING_KEY_ALIAS }}
          ORBIT_SIGNING_KEY_PASSWORD: ${{ env.ORBIT_SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Collect release artifacts
        run: |
          mkdir -p release
          shopt -s nullglob
          apks=(app/build/outputs/apk/release/*.apk)
          if [ ${#apks[@]} -eq 0 ]; then
            echo "No release APK files found in app/build/outputs/apk/release"
            exit 1
          fi
          cp -v "${apks[@]}" release/

      - name: Upload release folder
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: release/

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          body: |

            ## Highlights

            ### Introducing the Orbit Bubble Widget

            The Orbit Bubble is your always-available AI assistant, floating over any app for instant access. Here’s everything you can do with it:

            - **Enable/Disable Instantly:** Toggle the floating bubble on or off from the new settings page. Requires overlay and audio permissions.
            - **Modes:**
              - **Round:** Classic floating bubble, draggable anywhere.
              - **Slide:** Slim, right-edge tab—half-visible for minimal distraction, always ready.
            - **Quick Interactions:**
              - **Tap:** Start voice-to-text and chat with AI instantly.
              - **Long Press:** Dismiss the bubble from your screen.
              - **Drag:** Move and dock the bubble to any screen edge. It snaps safely and stays visible.
            - **Response Display:**
              - **Overlay Mode:** See AI responses in a beautiful, draggable, glassy overlay right over your current app.
              - **App Mode:** Open responses directly in the Orbit chat app.
            - **Customization:**
              - **Size:** Choose Small, Medium, or Large for the bubble.
              - **Idle Transparency:** Set how see-through the bubble is when idle (20%–100%).
              - **Response Window Height:** Adjust the overlay’s height for comfort (70–360dp).
            - **Visual Polish:**
              - Violet glassmorphism, dark mode support, and smooth animations.
            - **Permissions Helper:** Settings screen guides you to grant overlay and audio permissions as needed.

            The Orbit Bubble is designed for speed, privacy, and seamless multitasking—making AI just a tap away, anywhere on your device.

          append_body: true
          generate_release_notes: true
