name: Build Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Collect release artifacts
        run: |
          mkdir -p release
          shopt -s nullglob
          apks=(app/build/outputs/apk/release/*.apk)
          if [ ${#apks[@]} -eq 0 ]; then
            echo "No release APK files found in app/build/outputs/apk/release"
            exit 1
          fi
          cp -v "${apks[@]}" release/

      - name: Upload release folder
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: release/
